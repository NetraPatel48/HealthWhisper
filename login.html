<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Whisper | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f766e,#115e59,#1e3a8a);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#34d399;
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(100px);
    opacity:.35;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#60a5fa;
    border-radius:50%;
    bottom:-180px;
    right:-150px;
    filter:blur(100px);
    opacity:.35;
}

.login-box{
    position:relative;
    width:400px;
    padding:40px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
    text-align:center;
    font-size:60px;
}

h1{
    text-align:center;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    margin:10px 0 30px;
    color:#dbeafe;
    font-size:15px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
    color:#333;
    font-size:14px;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#059669;
}

.signup{
    margin-top:20px;
    text-align:center;
}

.signup a{
    color:#fff;
    font-weight:bold;
    text-decoration:none;
}

@media(max-width:450px){

.login-box{
width:90%;
padding:30px;
}

}
</style>

</head>
<body>

<div class="login-box">

<div class="logo">🌿</div>

<h1>Health Whisper</h1>

<p class="subtitle">
Login to explore herbal remedies, healthy recipes and AI-powered healthcare information.
</p>

<form onsubmit="return loginUser()">

<div class="input-box">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>

<div class="password-box">
<input type="password" id="password" placeholder="Enter your password" required>
<span onclick="togglePassword()">👁</span>
</div>

</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">
Login
</button>

<div class="signup">
Don't have an account?
<a href="#">Create Account</a>
</div>

</form>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password")
pass.type="text";
else
pass.type="password";

}

function loginUser(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email==="" || password===""){
alert("Please fill all fields.");
return false;
}

alert("Login Successful!");

window.location.href="HealthWhisper.html";

return false;

}

</script>

</body>
</html>
