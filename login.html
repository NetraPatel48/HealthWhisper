<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Whisper | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#1a1a1a;
    color:#e0e0e0;
    font-family:'Inter',sans-serif;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#34d399;
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(100px);
    opacity:.35;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#60a5fa;
    border-radius:50%;
    bottom:-180px;
    right:-150px;
    filter:blur(100px);
    opacity:.35;
}

.login-box{
    width:400px;
    max-width:90%;
    background:#2a2a2a;
    border-radius:15px;
    padding:35px;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
}

.logo{
    text-align:center;
    font-size:60px;
}

h1{
    text-align:center;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    margin:10px 0 30px;
    color:#dbeafe;
    font-size:15px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #444;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:16px;
    outline:none;
    box-sizing:border-box;
}

.input-box input::placeholder{
    color:#999;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box input{
    padding-right:45px;
}

.eye-btn{
    position:absolute;
    top:50%;
    right:15px;
    transform:translateY(-50%);
    border:none;
    background:none;
    color:#99f2c8;
    cursor:pointer;
    font-size:18px;
}

.password-box span{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
    color:#333;
    font-size:14px;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#56ab2f,#a8e063);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:linear-gradient(45deg,#a8e063,#56ab2f);
    transform:translateY(-2px);
}

.signup{
    margin-top:20px;
    text-align:center;
}

.signup a{
    color:#fff;
    font-weight:bold;
    text-decoration:none;
}

@media(max-width:450px){

.login-box{
width:90%;
padding:30px;
}

}
</style>

</head>
<body>

<div class="login-box">

<div class="logo">🌿</div>

<h1>Health Whisper</h1>

<p class="subtitle">
Login to explore herbal remedies, healthy recipes and AI-powered healthcare information.
</p>
    
<form onsubmit="loginUser(event)">

<div class="input-box">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>

<div class="password-box">

<input type="password"
id="password"
placeholder="Enter your password"
required>

<button
type="button"
class="eye-btn"
onclick="togglePassword()">

👁

</button>

</div>

</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">
Login
</button>

<div class="signup">
Don't have an account?
<a href="#">Create Account</a>
</div>

</form>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password")
pass.type="text";
else
pass.type="password";

}
    
function loginUser(event){

event.preventDefault();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value.trim();

if(!email || !password){

alert("Please enter Email and Password.");

return false;

}

window.location.href="HealthWhisper.html";

}
    


</script>

</body>
</html>
